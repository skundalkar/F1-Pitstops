name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    name: Quality gate (Python 3.11)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.1.5
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Install quality dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements-dev.txt
      - name: Install Chromium for browser acceptance
        run: python -m playwright install --with-deps chromium
      - name: Run unit quality gate
        run: ./scripts/verify.sh
        env:
          CI_DIFF_BASE: ${{ github.event.pull_request.base.sha || github.event.before }}
      - name: Run browser acceptance gate
        run: ./scripts/verify-browser.sh
      - name: Upload failure evidence
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: quality-gate-evidence
          path: |
            test-results/
            .coverage
          if-no-files-found: ignore
