name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test and smoke check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements-dev.txt
      - name: Run unit tests and compile check
        run: python -m pytest -q && python -m py_compile app.py
      - name: Smoke-start the Streamlit app
        shell: bash
        run: |
          python -m streamlit run app.py --server.headless true --server.address 127.0.0.1 --server.port 8501 > streamlit.log 2>&1 &
          app_pid=$!
          trap 'kill "$app_pid"' EXIT
          for attempt in {1..20}; do
            if curl --fail --silent http://127.0.0.1:8501/_stcore/health > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat streamlit.log
          exit 1
